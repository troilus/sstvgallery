<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☄SSTV GALLERY🖼📶</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
        
            color: #333;
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }
        
        .folder-section {
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .folder-title {
            background: linear-gradient(45deg, #3498db, #9b59b6);
            color: white;
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            transition: all 0.3s ease;
            position: relative;
        }

        .folder-title:hover {
            background: linear-gradient(45deg, #2980b9, #8e44ad);
        }

        .folder-title::after {
            content: '▼';
            position: absolute;
            right: 20px;
            transition: transform 0.3s ease;
        }

        .folder-title.collapsed::after {
            transform: rotate(-90deg);
        }

        .images-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 20px;
            max-height: 5000px;
            overflow-y: auto;
            transition: max-height 0.5s ease-out, opacity 0.3s ease;
        }

        .images-container.collapsed {
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
            opacity: 0;
            overflow: hidden;
        }

        .image-item {
            display: flex;
            align-items: center;
            gap: 15px;
            background: white;
            padding: 8px 15px;
            border-radius: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .image-item:hover {
            background: #f8f9fa;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .image-wrapper {
            height: 1.2em;
            flex-shrink: 0;
            overflow: hidden;
            border-radius: 4px;
        }

        .image-wrapper img {
            height: 100%;
            width: auto;
            object-fit: contain;
        }

        .image-name {
            flex: 1;
            font-size: 0.9rem;
            color: #555;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>SSTV GALLERY☄</h1>
            <p>Received by BD8CKF</p>
        </header>
        
        <div id="folders-container">
            <div class="loading">正在加载图片...</div>
        </div>

        <div id="image-modal" class="modal" onclick="closeModal(event)">
            <img id="modal-image" src="" alt="大图预览">
        </div>
    </div>

    <script>
        async function loadGallery() {
            try {
                const response = await fetch('data/gallery-data.json');
                const data = await response.json();
                displayGallery(data);
            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('folders-container').innerHTML = 
                    '<div class="loading">加载失败，请检查数据文件</div>';
            }
        }

        function displayGallery(data) {
            const container = document.getElementById('folders-container');
            container.innerHTML = '';

            for (const [folderName, images] of Object.entries(data)) {
                const folderSection = document.createElement('div');
                folderSection.className = 'folder-section';

                const imageCount = images.length;

                folderSection.innerHTML = `
                    <div class="folder-title collapsed" onclick="toggleFolder(this)">
                        ${folderName} <span style="font-size: 0.85em; opacity: 0.8; margin-left: 10px;">(${imageCount})</span>
                    </div>
                    <div class="images-container collapsed">
                        ${images.map(image => `
                            <div class="image-item" onclick="showImage('${image.url}')">
                                <div class="image-wrapper">
                                    <img src="${image.url}" alt="${image.name}" loading="lazy">
                                </div>
                                <div class="image-name">${image.name}</div>
                            </div>
                        `).join('')}
                    </div>
                `;

                container.appendChild(folderSection);
            }
        }

        function toggleFolder(titleElement) {
            const imagesContainer = titleElement.nextElementSibling;
            titleElement.classList.toggle('collapsed');
            imagesContainer.classList.toggle('collapsed');
        }

        function showImage(url) {
            const modal = document.getElementById('image-modal');
            const modalImg = document.getElementById('modal-image');
            modalImg.src = url;
            modal.classList.add('active');
        }

        function closeModal(e) {
            if (e.target.id === 'image-modal') {
                const modal = document.getElementById('image-modal');
                modal.classList.remove('active');
            }
        }

        // 页面加载时获取数据
        loadGallery();
    </script>
</body>
</html>
